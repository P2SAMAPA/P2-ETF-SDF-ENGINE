name: Training Pipeline
on:
  workflow_dispatch:

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        fold: [0, 1, 2, 3]
        lr: [0.001, 0.01]
        model: ["rf", "xgb"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run training
        run: |
          python train.py \
            --fold ${{ matrix.fold }} \
            --lr ${{ matrix.lr }} \
            --model ${{ matrix.model }}
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-fold${{ matrix.fold }}-${{ matrix.model }}-${{ matrix.lr }}
          path: outputs/
          retention-days: 1

  # Runs once — after ALL matrix training jobs finish successfully
  generate_signals:
    needs: train
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate daily signals
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python predict.py
