name: Parallel Matrix Training (CPU)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install datasets huggingface_hub pandas numpy scikit-learn statsmodels pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Login to Hugging Face
        run: python -c "from huggingface_hub import login; login(token='${{ env.HF_TOKEN }}')"
      
      - name: Quick validation
        env:
          CI_MODE: true
          MAX_WINDOWS: 10
        run: python train.py --fold 0 --lr 0.01 --model xgb

  train:
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        fold: [0, 1, 2, 3]
        lr: [0.001, 0.01]
        model: ["rf", "xgb"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install datasets huggingface_hub pandas numpy scikit-learn statsmodels pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Login to Hugging Face
        run: python -c "from huggingface_hub import login; login(token='${{ env.HF_TOKEN }}')"

      - name: Run training
        env:
          CI_MODE: true
        run: |
          python train.py \
            --fold ${{ matrix.fold }} \
            --lr ${{ matrix.lr }} \
            --model ${{ matrix.model }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-fold${{ matrix.fold }}-lr${{ matrix.lr }}-${{ matrix.model }}
          path: |
            outputs/
            models/
            *.pkl
            *.json
          retention-days: 7
