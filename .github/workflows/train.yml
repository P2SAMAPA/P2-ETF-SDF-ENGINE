name: Parallel Matrix Training (CPU)

on:
  workflow_dispatch:

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  INPUT_DATASET: "P2SAMAPA/fi-etf-macro-signal-master-data"
  OUTPUT_DATASET: "P2SAMAPA/p2-etf-sdf-engine-results"

jobs:
  train:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        fold: [0, 1, 2, 3]
        lr: [0.001, 0.01]
        model: ["rf", "xgb"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Hugging Face datasets
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface/datasets
          key: ${{ runner.os }}-hf-datasets-${{ env.INPUT_DATASET }}
          restore-keys: |
            ${{ runner.os }}-hf-datasets-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install datasets huggingface_hub pandas numpy scikit-learn statsmodels plotly streamlit pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Login to Hugging Face
        run: |
          python -c "from huggingface_hub import login; login(token='${{ env.HF_TOKEN }}')"

      - name: Run training
        run: |
          python train.py \
            --input ${{ env.INPUT_DATASET }} \
            --output ${{ env.OUTPUT_DATASET }} \
            --fold ${{ matrix.fold }} \
            --lr ${{ matrix.lr }} \
            --model ${{ matrix.model }}
